# !! DO NOT COMMIT this file with real values !!
# This is a template. The deploy script creates the secret from environment variables.
# Apply manually only in emergencies:
#   kubectl apply -f secret.yaml
#
# To update a single value:
#   kubectl patch secret ds-catalog-secret -p '{"stringData":{"JWT_SECRET":"new-value"}}'
apiVersion: v1
kind: Secret
metadata:
  name: ds-catalog-secret
type: Opaque
stringData:
  # PostgreSQL password (must match POSTGRES_PASSWORD used by postgres.yaml)
  POSTGRES_PASSWORD: "catalog"

  # PostgreSQL connection string — points to the in-cluster postgres service
  DATABASE_URL: "postgresql://catalog:catalog@ds-catalog-postgres:5432/ds_catalog"

  # Django-style secret key for session signing
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"

  # JWT signing secret
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"

  # Google OAuth2 credentials
  GOOGLE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "YOUR_GOOGLE_CLIENT_SECRET"

  # Gemini API key (leave empty to use Vertex AI / Workload Identity)
  GEMINI_API_KEY: ""

  # Google Chat webhook for notifications (optional)
  GOOGLE_CHAT_WEBHOOK_URL: ""

  # Secret Manager secret name for BQ service account (optional, leave empty
  # when using Workload Identity)
  BQ_SECRET_NAME: ""
