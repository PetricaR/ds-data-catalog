apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds-catalog-backend
  labels:
    app: ds-catalog-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ds-catalog-backend
  template:
    metadata:
      labels:
        app: ds-catalog-backend
    spec:
      serviceAccountName: ds-catalog-sa
      containers:
        - name: ds-catalog-backend
          # NOTE: deploy script replaces IMAGE_URL_PLACEHOLDER at deploy time
          image: IMAGE_URL_PLACEHOLDER
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ds-catalog-config
            - secretRef:
                name: ds-catalog-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20  # 100s startup budget
