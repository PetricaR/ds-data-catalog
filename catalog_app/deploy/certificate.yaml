# GKE Managed TLS Certificate — only needed when using the Ingress approach.
# Replace the domain with your actual domain before applying.
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: ds-catalog-cert
spec:
  domains:
    - catalog.YOUR_DOMAIN_HERE  # e.g. catalog.formare-ai.com
