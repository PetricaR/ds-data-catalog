apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds-catalog-frontend
  labels:
    app: ds-catalog-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ds-catalog-frontend
  template:
    metadata:
      labels:
        app: ds-catalog-frontend
    spec:
      containers:
        - name: ds-catalog-frontend
          # NOTE: deploy script replaces IMAGE_URL_PLACEHOLDER at deploy time
          image: IMAGE_URL_PLACEHOLDER
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
