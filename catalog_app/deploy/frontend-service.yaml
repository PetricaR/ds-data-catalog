apiVersion: v1
kind: Service
metadata:
  name: ds-catalog-frontend
  labels:
    app: ds-catalog-frontend
spec:
  # LoadBalancer exposes the frontend (with nginx proxying /api/v1 to backend)
  # Change to ClusterIP + Ingress if you want TLS / a custom domain
  type: LoadBalancer
  selector:
    app: ds-catalog-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
